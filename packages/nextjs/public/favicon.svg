<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <radialGradient id="curyo-favicon-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF687A" stop-opacity="0.26" />
      <stop offset="62%" stop-color="#FF687A" stop-opacity="0.091" />
      <stop offset="100%" stop-color="#FF687A" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="curyo-favicon-planet" x1="0.15" y1="0.1" x2="0.85" y2="0.9" gradientUnits="objectBoundingBox" gradientTransform="rotate(42 0.5 0.5)">
      <stop offset="0%" stop-color="#359EEE" />
      <stop offset="34%" stop-color="#EF476F" />
      <stop offset="68%" stop-color="#FFC43D" />
      <stop offset="100%" stop-color="#03CEA4" />
    </linearGradient>
    <radialGradient id="curyo-favicon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF476F" stop-opacity="0.22" />
      <stop offset="56%" stop-color="#FFC43D" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#03CEA4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="curyo-favicon-highlight" cx="0" cy="0" r="1" gradientUnits="objectBoundingBox" gradientTransform="translate(0.34 0.3) scale(0.44 0.34)">
      <stop stop-color="#FFFFFF" stop-opacity="0.56" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="curyo-favicon-ring" x1="0" y1="0.3" x2="1" y2="0.7" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFDCE7" />
      <stop offset="48%" stop-color="#FFF8FB" />
      <stop offset="100%" stop-color="#FFEFF5" />
    </linearGradient>
    <clipPath id="curyo-favicon-ring-back">
      <rect x="0" y="0" width="512" height="256" />
    </clipPath>
    <clipPath id="curyo-favicon-ring-front">
      <rect x="0" y="256" width="512" height="256" />
    </clipPath>
  </defs>

  <circle cx="256" cy="256" r="178" fill="url(#curyo-favicon-halo)" />

  <g transform="rotate(-18 256 256)">
    <ellipse
      cx="256"
      cy="256"
      rx="198"
      ry="54"
      fill="none"
      stroke="url(#curyo-favicon-ring)"
      stroke-width="18"
      stroke-opacity="0.96"
      clip-path="url(#curyo-favicon-ring-back)"
      stroke-linecap="round"
    />
  </g>

  <circle cx="256" cy="256" r="194" fill="url(#curyo-favicon-glow)" fill-opacity="0.82" />
  <circle cx="256" cy="256" r="108" fill="url(#curyo-favicon-planet)" />
  <circle cx="256" cy="256" r="86.4" fill="url(#curyo-favicon-highlight)" />

  <g transform="rotate(-18 256 256)">
    <ellipse
      cx="256"
      cy="256"
      rx="198"
      ry="54"
      fill="none"
      stroke="url(#curyo-favicon-ring)"
      stroke-width="18"
      stroke-opacity="0.96"
      clip-path="url(#curyo-favicon-ring-front)"
      stroke-linecap="round"
    />
  </g>
</svg>
