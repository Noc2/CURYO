      <stop offset="100%" stop-color="#5BD7B8" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="curyo-logo-orbit" x1="110" y1="150" x2="394" y2="366" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#03CEA4" stop-opacity=".18" />
      <stop offset="32%" stop-color="#FFC43D" stop-opacity=".16" />
      <stop offset="64%" stop-color="#EF476F" stop-opacity=".18" />
