<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <linearGradient id="curyo-logo-main-fill" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(28 .5 .5)">
      <stop offset="0%" stop-color="#FFC43D" />
      <stop offset="34%" stop-color="#EF476F" />
      <stop offset="68%" stop-color="#359EEE" />
      <stop offset="100%" stop-color="#03CEA4" />
    </linearGradient>
    <radialGradient id="curyo-logo-main-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE08E" stop-opacity=".54" />
