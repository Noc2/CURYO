  <rect x="700" y="340" width="420" height="2" rx="1" fill="#1D2840" />

  <text
    x="700"
    y="250"
    font-family="'Space Grotesk', 'Inter', 'Segoe UI', sans-serif"
    font-size="132"
    font-weight="700"
