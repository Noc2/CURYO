  <rect width="1600" height="520" fill="url(#bg)" />
  <circle cx="430" cy="230" r="300" fill="url(#glow-left)" />
  <circle cx="1120" cy="250" r="420" fill="url(#glow-right)" />

  <g mask="url(#curyo-ring-mask)" transform="rotate(-22.5 430 230)">
    <path d="M430 122 A108 108 0 0 1 538 230" stroke="url(#curyo-top-right)" stroke-width="42" stroke-linecap="round" />
    <path d="M538 230 A108 108 0 0 1 430 338" stroke="url(#curyo-bottom-right)" stroke-width="42" stroke-linecap="round" />
    <path d="M430 338 A108 108 0 0 1 322 230" stroke="url(#curyo-bottom-left)" stroke-width="42" stroke-linecap="round" />
    <path d="M322 230 A108 108 0 0 1 430 122" stroke="url(#curyo-top-left)" stroke-width="42" stroke-linecap="round" />
