<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#111118"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="640" cy="160" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#359EEE" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#03CEA4" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#orbGlow)"/>

  <!-- Ellipse orb (centered) -->
  <g transform="translate(640,160)">
    <!-- Outer blue ellipses -->
    <ellipse rx="155" ry="90" fill="none" stroke="#359EEE" stroke-width="0.8" opacity="0.10" transform="rotate(0)"/>
    <ellipse rx="150" ry="92" fill="none" stroke="#359EEE" stroke-width="0.8" opacity="0.12" transform="rotate(12)"/>
    <ellipse rx="145" ry="94" fill="none" stroke="#359EEE" stroke-width="0.9" opacity="0.14" transform="rotate(24)"/>
    <ellipse rx="140" ry="96" fill="none" stroke="#359EEE" stroke-width="0.9" opacity="0.16" transform="rotate(36)"/>
    <ellipse rx="135" ry="98" fill="none" stroke="#359EEE" stroke-width="1.0" opacity="0.18" transform="rotate(48)"/>
    <ellipse rx="130" ry="100" fill="none" stroke="#359EEE" stroke-width="1.0" opacity="0.20" transform="rotate(60)"/>

    <!-- Teal transition -->
    <ellipse rx="125" ry="100" fill="none" stroke="#03CEA4" stroke-width="1.0" opacity="0.22" transform="rotate(72)"/>
    <ellipse rx="120" ry="100" fill="none" stroke="#03CEA4" stroke-width="1.1" opacity="0.25" transform="rotate(84)"/>
    <ellipse rx="115" ry="98" fill="none" stroke="#03CEA4" stroke-width="1.1" opacity="0.27" transform="rotate(96)"/>
    <ellipse rx="110" ry="96" fill="none" stroke="#03CEA4" stroke-width="1.2" opacity="0.28" transform="rotate(108)"/>

    <!-- Yellow transition -->
    <ellipse rx="105" ry="94" fill="none" stroke="#FFC43D" stroke-width="1.2" opacity="0.28" transform="rotate(120)"/>
    <ellipse rx="100" ry="92" fill="none" stroke="#FFC43D" stroke-width="1.3" opacity="0.30" transform="rotate(132)"/>
    <ellipse rx="95" ry="90" fill="none" stroke="#FFC43D" stroke-width="1.3" opacity="0.32" transform="rotate(144)"/>
    <ellipse rx="90" ry="88" fill="none" stroke="#FFC43D" stroke-width="1.4" opacity="0.33" transform="rotate(156)"/>

    <!-- Pink inner -->
    <ellipse rx="85" ry="85" fill="none" stroke="#EF476F" stroke-width="1.4" opacity="0.30" transform="rotate(168)"/>
    <ellipse rx="80" ry="82" fill="none" stroke="#EF476F" stroke-width="1.5" opacity="0.28" transform="rotate(0)"/>
    <ellipse rx="75" ry="78" fill="none" stroke="#EF476F" stroke-width="1.5" opacity="0.25" transform="rotate(15)"/>

    <!-- Core ellipses -->
    <ellipse rx="70" ry="74" fill="none" stroke="#359EEE" stroke-width="1.4" opacity="0.22" transform="rotate(35)"/>
    <ellipse rx="65" ry="70" fill="none" stroke="#03CEA4" stroke-width="1.4" opacity="0.20" transform="rotate(55)"/>
    <ellipse rx="60" ry="65" fill="none" stroke="#FFC43D" stroke-width="1.3" opacity="0.18" transform="rotate(75)"/>
    <ellipse rx="55" ry="60" fill="none" stroke="#EF476F" stroke-width="1.3" opacity="0.16" transform="rotate(95)"/>
  </g>

  <!-- Title text -->
  <text x="640" y="172" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">Curyo</text>

  <!-- Subtitle -->
  <text x="640" y="212" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#777" text-anchor="middle" letter-spacing="3">DECENTRALIZED REPUTATION GAME</text>
</svg>
