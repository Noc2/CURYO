  <circle cx="256" cy="256" r="118" fill="url(#banner-orb-glow)" />
  <circle cx="256" cy="256" r="64" fill="url(#banner-orb)" />
  <circle cx="256" cy="256" r="52" fill="url(#banner-gloss)" />

