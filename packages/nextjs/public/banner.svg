<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" width="1600" height="520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060812" />
      <stop offset="0.55" stop-color="#050814" />
      <stop offset="1" stop-color="#0A0E18" />
    </linearGradient>
    <radialGradient id="glow-left" cx="430" cy="230" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F1D33" stop-opacity="0.62" />
      <stop offset="0.58" stop-color="#08101D" stop-opacity="0.22" />
      <stop offset="1" stop-color="#060812" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-right" cx="1120" cy="250" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10182B" stop-opacity="0.2" />
      <stop offset="1" stop-color="#060812" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="curyo-top-right" x1="430" y1="122" x2="538" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFC43D" />
      <stop offset="1" stop-color="#EF476F" />
    </linearGradient>
    <linearGradient id="curyo-bottom-right" x1="538" y1="230" x2="430" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EF476F" />
      <stop offset="1" stop-color="#359EEE" />
    </linearGradient>
    <linearGradient id="curyo-bottom-left" x1="430" y1="338" x2="322" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#359EEE" />
      <stop offset="1" stop-color="#03CEA4" />
    </linearGradient>
    <linearGradient id="curyo-top-left" x1="322" y1="230" x2="430" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#03CEA4" />
      <stop offset="1" stop-color="#FFC43D" />
    </linearGradient>

    <mask id="curyo-ring-mask">
      <rect width="1600" height="520" fill="black" />
      <g transform="rotate(-22.5 430 230)">
        <circle cx="430" cy="230" r="108" fill="white" />
        <circle cx="430" cy="221.5" r="96" fill="black" />
