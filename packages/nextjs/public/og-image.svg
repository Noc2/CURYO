<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020305" />
      <stop offset="50%" stop-color="#070A15" />
      <stop offset="100%" stop-color="#101726" />
    </linearGradient>
    <radialGradient id="og-left-glow" cx="260" cy="320" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18243C" stop-opacity="0.58" />
      <stop offset="48%" stop-color="#0D1527" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#05070D" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="og-right-glow" cx="960" cy="270" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10182D" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#05070D" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="og-mark-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF687A" stop-opacity="0.26" />
      <stop offset="62%" stop-color="#FF687A" stop-opacity="0.091" />
      <stop offset="100%" stop-color="#FF687A" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="og-mark-planet" x1="0.15" y1="0.1" x2="0.85" y2="0.9" gradientUnits="objectBoundingBox" gradientTransform="rotate(42 0.5 0.5)">
      <stop offset="0%" stop-color="#359EEE" />
      <stop offset="34%" stop-color="#EF476F" />
      <stop offset="68%" stop-color="#FFC43D" />
      <stop offset="100%" stop-color="#03CEA4" />
    </linearGradient>
    <radialGradient id="og-mark-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF476F" stop-opacity="0.22" />
      <stop offset="56%" stop-color="#FFC43D" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#03CEA4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="og-mark-highlight" cx="0" cy="0" r="1" gradientUnits="objectBoundingBox" gradientTransform="translate(0.34 0.3) scale(0.44 0.34)">
      <stop stop-color="#FFFFFF" stop-opacity="0.56" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="og-mark-ring" x1="0" y1="0.3" x2="1" y2="0.7" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFDCE7" />
      <stop offset="48%" stop-color="#FFF8FB" />
      <stop offset="100%" stop-color="#FFEFF5" />
    </linearGradient>
    <clipPath id="og-mark-ring-back">
      <rect x="0" y="0" width="512" height="256" />
    </clipPath>
    <clipPath id="og-mark-ring-front">
      <rect x="0" y="256" width="512" height="256" />
    </clipPath>
    <symbol id="og-brand-mark" viewBox="0 0 512 512">
      <circle cx="256" cy="256" r="178" fill="url(#og-mark-halo)" />
      <g transform="rotate(-18 256 256)">
        <ellipse
          cx="256"
          cy="256"
          rx="198"
          ry="54"
          fill="none"
          stroke="url(#og-mark-ring)"
          stroke-width="18"
          stroke-opacity="0.96"
          clip-path="url(#og-mark-ring-back)"
          stroke-linecap="round"
        />
      </g>
      <circle cx="256" cy="256" r="194" fill="url(#og-mark-glow)" fill-opacity="0.82" />
      <circle cx="256" cy="256" r="108" fill="url(#og-mark-planet)" />
      <circle cx="256" cy="256" r="86.4" fill="url(#og-mark-highlight)" />
      <g transform="rotate(-18 256 256)">
        <ellipse
          cx="256"
          cy="256"
          rx="198"
          ry="54"
          fill="none"
          stroke="url(#og-mark-ring)"
          stroke-width="18"
          stroke-opacity="0.96"
          clip-path="url(#og-mark-ring-front)"
          stroke-linecap="round"
        />
      </g>
    </symbol>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)" />
  <circle cx="260" cy="320" r="340" fill="url(#og-left-glow)" />
  <circle cx="960" cy="270" r="420" fill="url(#og-right-glow)" />

  <g opacity="0.88">
    <circle cx="850" cy="112" r="4" fill="#FFDCE7" />
    <circle cx="972" cy="86" r="5" fill="#FFFFFF" fill-opacity="0.72" />
    <circle cx="1088" cy="138" r="4" fill="#359EEE" />
    <circle cx="1126" cy="458" r="4" fill="#03CEA4" />
    <circle cx="924" cy="498" r="3" fill="#FFC43D" />
  </g>

  <use href="#og-brand-mark" transform="translate(-4 174) scale(0.5)" />

  <text
    x="430"
    y="288"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="120"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="8"
  >
    CURYO
  </text>
  <text
    x="436"
    y="366"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="34"
    font-weight="400"
    fill="#A7B0C7"
    letter-spacing="1"
  >
    The Reputation Game for the Age of AI
  </text>
  <rect x="436" y="398" width="430" height="2" rx="1" fill="#1C2740" />
</svg>
