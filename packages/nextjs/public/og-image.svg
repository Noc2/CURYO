    <path d="M760 470C870 426 1006 430 1142 490" stroke="#131D34" stroke-width="2" stroke-linecap="round" />
    <path d="M738 128C804 188 884 216 960 212C1040 208 1110 164 1160 114" stroke="#17233E" stroke-width="1.5" stroke-linecap="round" opacity=".74" />
