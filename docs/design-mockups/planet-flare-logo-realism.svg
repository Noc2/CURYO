    <ellipse cx="722" cy="320" rx="154" ry="64" fill="url(#atmosphere-rim)"/>
  </g>
  <circle cx="512" cy="512" r="338" fill="url(#planet-highlight)"/>
  <circle cx="512" cy="512" r="338" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1.1"/>
</svg>
