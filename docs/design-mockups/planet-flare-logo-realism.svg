  <circle cx="512" cy="512" r="430" stroke="url(#flare-core)" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="732 1970" transform="rotate(-66 512 512)"/>
  <circle cx="878.5" cy="736.9" r="22" fill="#FF8E58" fill-opacity="0.14"/>
  <circle cx="878.5" cy="736.9" r="28" fill="url(#flare-head)"/>
  <circle cx="878.5" cy="736.9" r="11" fill="#FFF8EF"/>

  <g filter="url(#soft-blur-16)">
    <ellipse cx="504" cy="522" rx="354" ry="366" fill="#000000" fill-opacity="0.26"/>
  </g>

  <circle cx="512" cy="512" r="338" fill="url(#planet-shell)"/>
  <g clip-path="url(#planet-clip)">
    <g filter="url(#planet-relief)">
      <path d="M210 292C292 234 382 210 470 226C552 242 604 264 676 246C744 230 788 236 836 272C780 346 700 392 592 392C486 392 406 354 332 328C286 310 248 302 210 292Z" fill="#B84522" fill-opacity="0.44"/>
      <path d="M560 182C656 184 746 234 804 320C748 350 682 352 626 332C566 310 534 260 560 182Z" fill="#E17B2C" fill-opacity="0.42"/>
