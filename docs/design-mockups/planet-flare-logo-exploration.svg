    <rect x="70" y="58" width="1460" height="884" rx="36" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="2"/>
  </g>

  <text x="116" y="150" fill="#FFFFFF" font-size="46" font-weight="700" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">Planet + Flare Logo Exploration</text>
  <text x="116" y="194" fill="#FFFFFF" fill-opacity="0.56" font-size="22" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">Three directions for replacing the lighthouse mark with the new planet-and-flare system.</text>

  <g>
    <rect x="100" y="246" width="420" height="596" rx="30" fill="url(#card-fill)"/>
    <rect x="100" y="246" width="420" height="596" rx="30" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>
    <text x="132" y="302" fill="#FFFFFF" font-size="30" font-weight="700" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">Orbital Badge</text>
    <text x="132" y="336" fill="#FFFFFF" fill-opacity="0.5" font-size="18" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">Standalone app/header mark</text>

    <g filter="url(#planet-glow)">
