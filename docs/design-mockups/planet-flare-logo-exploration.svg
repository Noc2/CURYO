    </g>
    <circle cx="308" cy="510" r="174" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="2"/>
    <circle cx="308" cy="510" r="158" stroke="#1C1E29" stroke-opacity="0.9" stroke-width="16"/>

    <g filter="url(#flare-glow)">
      <path d="M390 332A178 178 0 0 1 470 566" stroke="#F4614F" stroke-opacity="0.5" stroke-width="18" stroke-linecap="round"/>
    </g>
    <path d="M390 332A178 178 0 0 1 470 566" stroke="url(#flare-main)" stroke-width="7" stroke-linecap="round"/>
    <path d="M398 340A170 170 0 0 1 462 558" stroke="url(#flare-core)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="470" cy="566" r="9" fill="#FFF0D8"/>
    <circle cx="470" cy="566" r="18" fill="#FF8D65" fill-opacity="0.18"/>

    <circle cx="308" cy="510" r="138" fill="url(#planet-base)"/>
    <ellipse cx="252" cy="446" rx="88" ry="70" fill="#399DF0" fill-opacity="0.52"/>
    <ellipse cx="340" cy="420" rx="108" ry="74" fill="#F57680" fill-opacity="0.36"/>
    <ellipse cx="376" cy="474" rx="104" ry="68" fill="#FFD388" fill-opacity="0.34"/>
    <ellipse cx="320" cy="574" rx="130" ry="76" fill="#08C7A2" fill-opacity="0.26"/>
    <ellipse cx="248" cy="586" rx="116" ry="84" fill="#13263D" fill-opacity="0.54"/>
    <path d="M192 442C236 420 282 424 330 442C374 458 412 468 454 462" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="8" stroke-linecap="round"/>
    <path d="M184 520C230 500 282 502 332 522C374 538 416 548 452 544" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="7" stroke-linecap="round"/>
    <circle cx="308" cy="510" r="138" fill="url(#planet-rim)"/>

    <text x="132" y="744" fill="#FFFFFF" fill-opacity="0.78" font-size="18" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">Best fit: top-left nav, social avatar, app icon base.</text>
  </g>

  <g>
    <rect x="590" y="246" width="420" height="596" rx="30" fill="url(#card-fill)"/>
    <rect x="590" y="246" width="420" height="596" rx="30" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>
    <text x="622" y="302" fill="#FFFFFF" font-size="30" font-weight="700" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">Signal Crest</text>
    <text x="622" y="336" fill="#FFFFFF" fill-opacity="0.5" font-size="18" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">Badge with faint containment rings</text>

    <circle cx="798" cy="510" r="182" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="2"/>
    <circle cx="798" cy="510" r="160" stroke="#1C1E29" stroke-opacity="0.92" stroke-width="16"/>
    <circle cx="798" cy="510" r="146" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1.6"/>

