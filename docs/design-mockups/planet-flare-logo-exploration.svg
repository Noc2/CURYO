<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="board-bg" x1="96" y1="54" x2="1510" y2="948" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0C12"/>
      <stop offset="0.56" stop-color="#10141F"/>
      <stop offset="1" stop-color="#0A0E16"/>
    </linearGradient>
    <radialGradient id="board-left-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(286 186) rotate(54.462) scale(382 468)">
      <stop stop-color="#1A2B4B" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#1A2B4B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="board-right-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1288 224) rotate(143.129) scale(432 324)">
      <stop stop-color="#F17173" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#F17173" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="board-bottom-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1118 930) rotate(162.166) scale(544 246)">
      <stop stop-color="#FF7A47" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FF7A47" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="card-fill" x1="98" y1="148" x2="1502" y2="862" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1118"/>
      <stop offset="1" stop-color="#0B0D14"/>
    </linearGradient>
    <filter id="card-shadow" x="56" y="102" width="1488" height="772" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="planet-glow" x="136" y="156" width="1248" height="590" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="flare-glow" x="126" y="106" width="1336" height="634" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <radialGradient id="planet-base" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0.68 0.22) scale(0.92 0.96)">
      <stop stop-color="#FFD49B"/>
      <stop offset="0.18" stop-color="#FFB278"/>
      <stop offset="0.36" stop-color="#F16A73"/>
      <stop offset="0.58" stop-color="#7B78EA"/>
      <stop offset="0.77" stop-color="#3395E8"/>
      <stop offset="1" stop-color="#0A2D3F"/>
    </radialGradient>
    <radialGradient id="planet-rim" cx="0" cy="0" r="1" gradientUnits="objectBoundingBox" gradientTransform="translate(0.72 0.24) scale(0.5 0.4)">
      <stop stop-color="#FFFFFF" stop-opacity="0.54"/>
      <stop offset="0.44" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flare-main" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#F45D4F"/>
      <stop offset="30%" stop-color="#FF8C5F"/>
      <stop offset="62%" stop-color="#FFC37A"/>
      <stop offset="100%" stop-color="#FFF0D8"/>
    </linearGradient>
    <linearGradient id="flare-core" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF9B75"/>
      <stop offset="52%" stop-color="#FFF0CF"/>
      <stop offset="100%" stop-color="#FFF7EA"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="#06070B"/>
  <rect width="1600" height="1000" fill="url(#board-left-glow)"/>
  <rect width="1600" height="1000" fill="url(#board-right-glow)"/>
  <rect width="1600" height="1000" fill="url(#board-bottom-glow)"/>

  <g filter="url(#card-shadow)">
