    <ellipse cx="744" cy="448" rx="82" ry="66" fill="#399DF0" fill-opacity="0.54"/>
    <ellipse cx="830" cy="420" rx="102" ry="72" fill="#F57680" fill-opacity="0.38"/>
    <ellipse cx="864" cy="478" rx="96" ry="66" fill="#FFD388" fill-opacity="0.34"/>
    <ellipse cx="812" cy="572" rx="126" ry="72" fill="#08C7A2" fill-opacity="0.25"/>
    <ellipse cx="742" cy="584" rx="112" ry="82" fill="#13263D" fill-opacity="0.54"/>
    <path d="M684 448C728 426 774 430 818 446C860 462 896 472 936 466" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="8" stroke-linecap="round"/>
    <path d="M676 526C720 506 772 508 818 526C860 542 900 552 934 548" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="7" stroke-linecap="round"/>
