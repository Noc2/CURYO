    <ellipse cx="1166" cy="410" rx="52" ry="44" fill="#399DF0" fill-opacity="0.54"/>
    <ellipse cx="1220" cy="394" rx="66" ry="46" fill="#F57680" fill-opacity="0.38"/>
    <ellipse cx="1244" cy="432" rx="62" ry="42" fill="#FFD388" fill-opacity="0.34"/>
    <ellipse cx="1212" cy="492" rx="80" ry="50" fill="#08C7A2" fill-opacity="0.24"/>
    <ellipse cx="1162" cy="498" rx="76" ry="56" fill="#13263D" fill-opacity="0.52"/>
    <circle cx="1200" cy="450" r="86" fill="url(#planet-rim)"/>

    <text x="1114" y="610" fill="#FFFFFF" font-size="84" font-weight="700" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif" letter-spacing="1">CURYO</text>
    <text x="1114" y="650" fill="#FFFFFF" fill-opacity="0.58" font-size="19" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">Header/banner direction with a calmer</text>
    <text x="1114" y="676" fill="#FFFFFF" fill-opacity="0.58" font-size="19" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">badge-to-wordmark transition.</text>

    <text x="1112" y="744" fill="#FFFFFF" fill-opacity="0.78" font-size="18" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">Best fit: banner, README, exportable lockups,</text>
    <text x="1112" y="770" fill="#FFFFFF" fill-opacity="0.78" font-size="18" font-family="'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif">and wider marketing surfaces.</text>
