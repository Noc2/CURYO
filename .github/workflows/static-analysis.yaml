name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: crytic/slither-action@v0.4.0
        with:
          target: packages/foundry
          slither-config: packages/foundry/slither.config.json
          fail-on: high

  aderyn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install Aderyn
        run: |
          cargo install aderyn || (curl -L https://raw.githubusercontent.com/Cyfrin/aderyn/dev/cyfrinup/install | bash && cyfrinup)
      - name: Run Aderyn
        working-directory: packages/foundry
        run: aderyn .

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Run forge coverage
        working-directory: packages/foundry
        run: forge coverage --ir-minimum
