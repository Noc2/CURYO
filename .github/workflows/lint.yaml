name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [lts/*]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Init nested submodules (skip unavailable mobile-sdk-native)
        run: |
          cd packages/foundry/lib/self
          git submodule update --init contracts/lib/openzeppelin-foundry-upgrades contracts/lib/forge-std

      - name: Setup node env
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable
      
      - name: Install foundry-toolchain
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run foundry node, deploy contracts (& generate contracts typescript output)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          LOCALHOST_KEYSTORE_ACCOUNT: scaffold-eth-default
        run: |
          yarn chain &
          sleep 5
          yarn deploy

      - name: Run nextjs lint
        run: yarn next:lint --max-warnings=0

      - name: Check typings on nextjs
        run: yarn next:check-types

      - name: Verify production Next.js build
        env:
          DATABASE_URL: file:local.db
          NEXT_PUBLIC_PONDER_URL: https://ponder.example.com
          NEXT_PUBLIC_TARGET_NETWORKS: "11142220"
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
        run: yarn next:build
