name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    name: E2E (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: smoke
            command: yarn workspace @curyo/nextjs e2e:ci:smoke
            timeout: 30
            start_keeper: false
          - suite: lifecycle
            command: yarn workspace @curyo/nextjs e2e:ci:lifecycle
            timeout: 45
            start_keeper: false
          - suite: keeper
            command: yarn workspace @curyo/nextjs e2e:ci:keeper
            timeout: 35
            start_keeper: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - name: Init nested submodules (skip unavailable mobile-sdk-native)
        run: |
          cd packages/foundry/lib/self
          git submodule update --init contracts/lib/openzeppelin-foundry-upgrades contracts/lib/forge-std

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: nightly

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn workspace @curyo/nextjs exec playwright install chromium --with-deps

      - name: Start Anvil and deploy contracts
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          LOCALHOST_KEYSTORE_ACCOUNT: scaffold-eth-default
        run: |
          yarn chain &
          sleep 5
          yarn deploy

      - name: Start Ponder indexer
        run: yarn ponder:dev &

      - name: Build Next.js
        env:
          DATABASE_URL: file:local.db
          NEXT_PUBLIC_PONDER_URL: https://ponder.example.com
          NEXT_PUBLIC_TARGET_NETWORKS: "11142220"
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
        run: yarn workspace @curyo/nextjs build

      - name: Start Next.js
        run: yarn start &

      - name: Wait for services
        run: |
          # Wait for Next.js
          timeout 120 bash -c 'until curl -s http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'
          echo "✓ Next.js ready"

          # Wait for Ponder
          timeout 120 bash -c 'until curl -s "http://localhost:42069/content?limit=1" > /dev/null 2>&1; do sleep 2; done'
          echo "✓ Ponder ready"

      - name: Start keeper service
        if: matrix.start_keeper
        env:
          RPC_URL: http://127.0.0.1:8545
          CHAIN_ID: "31337"
          KEEPER_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
          METRICS_ENABLED: "true"
          METRICS_PORT: "9090"
        run: yarn keeper:start &

      - name: Wait for keeper
        if: matrix.start_keeper
        run: |
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:9090/health > /dev/null 2>&1; do sleep 2; done'
          echo "✓ Keeper ready"

      - name: Run E2E tests
        run: ${{ matrix.command }}
        env:
          CI: true
          # Anvil/Hardhat account #2 — well-known test key, no real funds
          KEEPER_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.suite }}
          path: packages/nextjs/e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
