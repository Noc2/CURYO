enableColors: true

logFilters:
  - level: discard
    pattern: "@curyo/nextjs@workspace:packages/nextjs provides react*which doesn't satisfy what @selfxyz/qrcode and some of its descendants request"
  - level: discard
    pattern: "@curyo/nextjs@workspace:packages/nextjs provides react-dom*which doesn't satisfy what @selfxyz/qrcode and some of its descendants request"

nmHoistingLimits: workspaces

nodeLinker: node-modules

packageExtensions:
  "@scaffold-ui/debug-contracts@*":
    peerDependencies:
      react-dom: "*"
  "@solana/web3.js@*":
    dependencies:
      typescript: "~5.8.2"
  "burner-connector@*":
    peerDependencies:
      "@tanstack/react-query": "*"
      react: "*"
      react-dom: "*"
  "kubo-rpc-client@*":
    dependencies:
      undici: "5.28.4"
  "react-hot-toast@*":
    dependencies:
      csstype: "^3.1.3"

plugins:
  - path: .yarn/plugins/@yarnpkg/plugin-typescript.cjs
    spec: "@yarnpkg/plugin-typescript"
  - path: .yarn/plugins/@yarnpkg/plugin-interactive-tools.cjs
    spec: "@yarnpkg/plugin-interactive-tools"

yarnPath: .yarn/releases/yarn-3.2.3.cjs
