<svg width="1800" height="1120" viewBox="0 0 1800 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rec-bg" x1="90" y1="80" x2="1710" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111C"/>
      <stop offset="0.56" stop-color="#0C1728"/>
      <stop offset="1" stop-color="#121F34"/>
    </linearGradient>
    <radialGradient id="rec-glow-1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1440 180) rotate(150) scale(420 260)">
      <stop stop-color="#FF8E61" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FF8E61" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rec-glow-2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(352 936) rotate(20) scale(460 220)">
      <stop stop-color="#6AA7FF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#6AA7FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shell-fill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111B2C"/>
      <stop offset="1" stop-color="#16253D"/>
    </linearGradient>
    <linearGradient id="card-fill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17304D"/>
      <stop offset="0.55" stop-color="#132540"/>
      <stop offset="1" stop-color="#0F1B31"/>
    </linearGradient>
    <linearGradient id="vote-pane-fill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1B2438"/>
      <stop offset="1" stop-color="#161D2D"/>
    </linearGradient>
    <linearGradient id="live-strip" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FFD0AA"/>
      <stop offset="1" stop-color="#FF895E"/>
    </linearGradient>
    <filter id="screen-shadow" x="-60" y="-40" width="1920" height="1240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="24"/>
      <feGaussianBlur stdDeviation="28"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0117647 0 0 0 0 0.0235294 0 0 0 0 0.0470588 0 0 0 0.4 0"/>
    </filter>
  </defs>

  <rect width="1800" height="1120" fill="url(#rec-bg)"/>
  <rect width="1800" height="1120" fill="url(#rec-glow-1)"/>
  <rect width="1800" height="1120" fill="url(#rec-glow-2)"/>

  <text x="64" y="74" fill="#F7F2EA" font-size="48" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
    Recommended Layout: Infinite Feed + Persistent Voting
  </text>
  <text x="64" y="112" fill="#A7B5C8" font-size="20" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
    The active card keeps the voting decision attached to the score while the feed itself becomes more fluid and continuous.
  </text>

  <g filter="url(#screen-shadow)">
    <rect x="54" y="150" width="1200" height="822" rx="42" fill="url(#shell-fill)"/>
    <rect x="1310" y="188" width="334" height="724" rx="44" fill="url(#shell-fill)"/>
  </g>
