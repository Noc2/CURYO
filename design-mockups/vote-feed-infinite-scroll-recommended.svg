  <rect x="1310" y="188" width="334" height="724" rx="44" stroke="#FFFFFF18" stroke-width="2"/>

  <text x="86" y="204" fill="#FFD0AA" font-size="13" letter-spacing="1.8" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
