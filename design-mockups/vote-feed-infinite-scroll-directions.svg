<svg width="1800" height="1240" viewBox="0 0 1800 1240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="board-bg" x1="90" y1="80" x2="1680" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111C"/>
      <stop offset="0.5" stop-color="#0B1524"/>
      <stop offset="1" stop-color="#101B2D"/>
    </linearGradient>
    <radialGradient id="board-glow-1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1508 180) rotate(148) scale(420 240)">
      <stop stop-color="#FF8D5C" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FF8D5C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="board-glow-2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(316 1020) rotate(18) scale(460 220)">
      <stop stop-color="#73A8FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#73A8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel-fill" x1="80" y1="140" x2="1680" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111B2C"/>
      <stop offset="1" stop-color="#152238"/>
    </linearGradient>
    <linearGradient id="content-fill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D3556"/>
      <stop offset="0.55" stop-color="#13243D"/>
      <stop offset="1" stop-color="#0F1B30"/>
    </linearGradient>
    <linearGradient id="media-fill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#335D8C"/>
      <stop offset="0.48" stop-color="#244565"/>
      <stop offset="1" stop-color="#192A42"/>
    </linearGradient>
    <linearGradient id="vote-fill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1B2234"/>
      <stop offset="1" stop-color="#171D2D"/>
    </linearGradient>
    <linearGradient id="pill-rec" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFAF75"/>
      <stop offset="1" stop-color="#FF835A"/>
    </linearGradient>
    <linearGradient id="pill-test" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7EB7FF"/>
      <stop offset="1" stop-color="#55E0D7"/>
    </linearGradient>
    <linearGradient id="pill-weak" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8A93A8"/>
      <stop offset="1" stop-color="#646E84"/>
    </linearGradient>
    <filter id="soft-shadow" x="-80" y="-80" width="1960" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="22"/>
      <feGaussianBlur stdDeviation="28"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0117647 0 0 0 0 0.0235294 0 0 0 0 0.0470588 0 0 0 0.48 0"/>
    </filter>
    <filter id="panel-shadow" x="0" y="100" width="1800" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="18"/>
      <feGaussianBlur stdDeviation="20"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0117647 0 0 0 0 0.0235294 0 0 0 0 0.0470588 0 0 0 0.36 0"/>
    </filter>
  </defs>

  <rect width="1800" height="1240" fill="url(#board-bg)"/>
  <rect width="1800" height="1240" fill="url(#board-glow-1)"/>
  <rect width="1800" height="1240" fill="url(#board-glow-2)"/>

  <text x="64" y="74" fill="#F7F2EA" font-size="48" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
    Infinite Vote Feed Directions
  </text>
  <text x="64" y="112" fill="#A7B5C8" font-size="20" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
    Three interface concepts for a TikTok-like discovery flow that still preserves Curyo's rating-first, anti-herding vote model.
  </text>

  <g filter="url(#panel-shadow)">
    <rect x="50" y="150" width="520" height="980" rx="34" fill="url(#panel-fill)"/>
    <rect x="640" y="150" width="520" height="980" rx="34" fill="url(#panel-fill)"/>
    <rect x="1230" y="150" width="520" height="980" rx="34" fill="url(#panel-fill)"/>
  </g>
  <rect x="50" y="150" width="520" height="980" rx="34" stroke="#FFFFFF18" stroke-width="2"/>
  <rect x="640" y="150" width="520" height="980" rx="34" stroke="#FFFFFF18" stroke-width="2"/>
  <rect x="1230" y="150" width="520" height="980" rx="34" stroke="#FFFFFF18" stroke-width="2"/>

  <g>
    <rect x="86" y="190" width="154" height="34" rx="17" fill="url(#pill-rec)"/>
    <text x="163" y="212" text-anchor="middle" fill="#09111C" font-size="13" font-weight="700" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
      RECOMMENDED
    </text>
    <text x="86" y="276" fill="#F6F2EC" font-size="34" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Signal Rail
    </text>
    <text x="86" y="314" fill="#A7B5C8" font-size="17" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Infinite vertical progression, but with the vote always visible
    </text>
    <text x="86" y="338" fill="#A7B5C8" font-size="17" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      on the active card instead of hidden behind a second step.
    </text>

    <rect x="86" y="388" width="448" height="316" rx="28" fill="#0E1624" stroke="#FFFFFF14" stroke-width="2"/>
    <rect x="106" y="408" width="256" height="276" rx="22" fill="url(#content-fill)"/>
    <rect x="382" y="408" width="132" height="276" rx="22" fill="url(#vote-fill)"/>
    <rect x="124" y="426" width="220" height="142" rx="18" fill="url(#media-fill)"/>
    <circle cx="170" cy="470" r="24" fill="#FFFFFF14"/>
    <circle cx="310" cy="468" r="14" fill="#FF9E73" fill-opacity="0.72"/>
    <rect x="124" y="592" width="152" height="12" rx="6" fill="#F7F2EA"/>
    <rect x="124" y="616" width="202" height="10" rx="5" fill="#D2DCE8" fill-opacity="0.62"/>
    <rect x="124" y="640" width="178" height="10" rx="5" fill="#D2DCE8" fill-opacity="0.34"/>
    <rect x="124" y="662" width="112" height="8" rx="4" fill="#FF8F61" fill-opacity="0.66"/>

    <text x="448" y="436" text-anchor="middle" fill="#B7C2D1" font-size="11" letter-spacing="1.8" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
      COMMUNITY
    </text>
    <text x="448" y="452" text-anchor="middle" fill="#B7C2D1" font-size="11" letter-spacing="1.8" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
      RATING
    </text>
    <circle cx="448" cy="510" r="34" stroke="#FF8D5C" stroke-width="8"/>
    <circle cx="448" cy="510" r="26" fill="#FF8D5C" fill-opacity="0.12"/>
    <text x="448" y="517" text-anchor="middle" fill="#F7F2EA" font-size="24" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      6.8
    </text>
    <rect x="406" y="562" width="84" height="28" rx="14" fill="#203048" stroke="#FF8D5C66"/>
    <text x="448" y="580" text-anchor="middle" fill="#FFD9C4" font-size="12" font-weight="600" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Hidden votes
    </text>
    <rect x="400" y="606" width="96" height="34" rx="17" fill="#F7F2EA"/>
    <text x="448" y="628" text-anchor="middle" fill="#09111C" font-size="13" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Score too low
    </text>
    <rect x="400" y="648" width="96" height="34" rx="17" fill="#22334C"/>
    <text x="448" y="670" text-anchor="middle" fill="#F7F2EA" font-size="13" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Score too high
    </text>

    <rect x="154" y="738" width="202" height="328" rx="34" fill="#0D1422" stroke="#FFFFFF18" stroke-width="2"/>
    <rect x="168" y="756" width="174" height="212" rx="22" fill="url(#media-fill)"/>
    <rect x="178" y="774" width="72" height="14" rx="7" fill="#F7F2EA" fill-opacity="0.16"/>
    <rect x="178" y="924" width="112" height="10" rx="5" fill="#F7F2EA"/>
    <rect x="178" y="944" width="138" height="8" rx="4" fill="#D6DFE8" fill-opacity="0.56"/>
    <rect x="170" y="980" width="170" height="72" rx="20" fill="#162338" stroke="#FF8D5C3A"/>
    <circle cx="204" cy="1016" r="19" fill="#FF8D5C" fill-opacity="0.14" stroke="#FF8D5C66"/>
    <text x="204" y="1022" text-anchor="middle" fill="#F7F2EA" font-size="14" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      6.8
    </text>
    <rect x="232" y="996" width="96" height="20" rx="10" fill="#F7F2EA"/>
    <text x="280" y="1010" text-anchor="middle" fill="#09111C" font-size="11" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Too low
    </text>
    <rect x="232" y="1024" width="96" height="20" rx="10" fill="#23354F"/>
    <text x="280" y="1038" text-anchor="middle" fill="#F7F2EA" font-size="11" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Too high
    </text>

    <rect x="390" y="758" width="124" height="54" rx="18" fill="#18253A" stroke="#FFFFFF12"/>
    <text x="452" y="780" text-anchor="middle" fill="#FFCEA9" font-size="11" letter-spacing="1.2" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
      WHY IT FITS
    </text>
    <text x="408" y="802" fill="#F7F2EA" font-size="13" font-weight="600" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Vote stays attached
    </text>
    <text x="408" y="820" fill="#F7F2EA" font-size="13" font-weight="600" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      to score context.
    </text>

    <rect x="86" y="1086" width="448" height="1" fill="#FFFFFF12"/>
    <text x="86" y="1118" fill="#F7F2EA" font-size="16" font-weight="600" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Default behaviors
    </text>
    <text x="86" y="1148" fill="#A7B5C8" font-size="15" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Visible vote controls. Neutral live activity. Auto-advance after commit.
    </text>
  </g>

  <g>
    <rect x="676" y="190" width="132" height="34" rx="17" fill="url(#pill-test)"/>
    <text x="742" y="212" text-anchor="middle" fill="#07131F" font-size="13" font-weight="700" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
      TEST CAREFULLY
    </text>
    <text x="676" y="276" fill="#F6F2EC" font-size="34" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Overlay Pulse
    </text>
    <text x="676" y="314" fill="#A7B5C8" font-size="17" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      More immersive and more social-looking, but only works if the
    </text>
    <text x="676" y="338" fill="#A7B5C8" font-size="17" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      rating and question stay visible without feeling like an afterthought.
    </text>

    <rect x="676" y="388" width="448" height="678" rx="28" fill="#0D1523" stroke="#FFFFFF14" stroke-width="2"/>
    <rect x="696" y="408" width="408" height="638" rx="24" fill="url(#media-fill)"/>
    <rect x="728" y="438" width="116" height="22" rx="11" fill="#0F1E30" stroke="#FFFFFF22"/>
    <text x="786" y="452" text-anchor="middle" fill="#F7F2EA" font-size="12" font-weight="600" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Live round activity
    </text>
    <circle cx="1058" cy="500" r="26" fill="#13243B" stroke="#FFFFFF18"/>
    <circle cx="1058" cy="558" r="26" fill="#13243B" stroke="#FFFFFF18"/>
    <circle cx="1058" cy="616" r="26" fill="#13243B" stroke="#FFFFFF18"/>
    <text x="1058" y="507" text-anchor="middle" fill="#F7F2EA" font-size="14" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      +
    </text>
    <text x="1058" y="564" text-anchor="middle" fill="#F7F2EA" font-size="13" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      save
    </text>
    <text x="1058" y="623" text-anchor="middle" fill="#F7F2EA" font-size="13" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      share
    </text>
    <rect x="724" y="824" width="352" height="166" rx="24" fill="#101A2C" fill-opacity="0.88" stroke="#FFFFFF16"/>
    <text x="748" y="854" fill="#B7C2D1" font-size="11" letter-spacing="1.6" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
      COMMUNITY RATING
    </text>
    <circle cx="790" cy="916" r="34" stroke="#72B2FF" stroke-width="8"/>
    <text x="790" y="923" text-anchor="middle" fill="#F7F2EA" font-size="24" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      6.8
    </text>
    <rect x="848" y="886" width="206" height="34" rx="17" fill="#F7F2EA"/>
    <text x="951" y="908" text-anchor="middle" fill="#09111C" font-size="13" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Score too low
    </text>
    <rect x="848" y="930" width="206" height="34" rx="17" fill="#23354F"/>
    <text x="951" y="952" text-anchor="middle" fill="#F7F2EA" font-size="13" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Score too high
    </text>

    <rect x="676" y="1086" width="448" height="1" fill="#FFFFFF12"/>
    <text x="676" y="1118" fill="#F7F2EA" font-size="16" font-weight="600" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Good for
    </text>
    <text x="676" y="1148" fill="#A7B5C8" font-size="15" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      A more content-led mood, as long as the vote sheet is still persistent.
    </text>
  </g>

  <g>
    <rect x="1266" y="190" width="142" height="34" rx="17" fill="url(#pill-weak)"/>
    <text x="1337" y="212" text-anchor="middle" fill="#EEF3FA" font-size="13" font-weight="700" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
      WEAK FIT
    </text>
    <text x="1266" y="276" fill="#F6F2EC" font-size="34" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Vote On Demand
    </text>
    <text x="1266" y="314" fill="#A7B5C8" font-size="17" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Cleanest feed, but it breaks the score-action relationship and adds
    </text>
    <text x="1266" y="338" fill="#A7B5C8" font-size="17" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      an interruptive second step before the core user decision.
    </text>

    <rect x="1266" y="388" width="448" height="678" rx="28" fill="#0D1523" stroke="#FFFFFF14" stroke-width="2"/>
    <rect x="1288" y="410" width="404" height="636" rx="26" fill="url(#content-fill)"/>
    <rect x="1312" y="434" width="356" height="228" rx="22" fill="url(#media-fill)"/>
    <rect x="1312" y="704" width="182" height="14" rx="7" fill="#F7F2EA"/>
    <rect x="1312" y="732" width="248" height="10" rx="5" fill="#D5DDE8" fill-opacity="0.6"/>
    <rect x="1312" y="756" width="204" height="10" rx="5" fill="#D5DDE8" fill-opacity="0.34"/>
    <rect x="1312" y="948" width="356" height="50" rx="25" fill="#F7F2EA"/>
    <text x="1490" y="979" text-anchor="middle" fill="#09111C" font-size="16" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Open voting sheet
    </text>

    <g filter="url(#soft-shadow)">
      <rect x="1360" y="560" width="262" height="232" rx="28" fill="#101A2C" stroke="#FFFFFF18" stroke-width="2"/>
    </g>
    <text x="1491" y="600" text-anchor="middle" fill="#B7C2D1" font-size="11" letter-spacing="1.8" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace">
      INTERRUPTS FEED FLOW
    </text>
    <circle cx="1491" cy="654" r="34" stroke="#8994AB" stroke-width="8"/>
    <text x="1491" y="661" text-anchor="middle" fill="#F7F2EA" font-size="24" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      6.8
    </text>
    <rect x="1405" y="708" width="172" height="34" rx="17" fill="#F7F2EA"/>
    <text x="1491" y="730" text-anchor="middle" fill="#09111C" font-size="13" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Score too low
    </text>
    <rect x="1405" y="750" width="172" height="34" rx="17" fill="#253750"/>
    <text x="1491" y="772" text-anchor="middle" fill="#F7F2EA" font-size="13" font-weight="700" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Score too high
    </text>

    <rect x="1230" y="1086" width="520" height="1" fill="#FFFFFF12"/>
    <text x="1266" y="1118" fill="#F7F2EA" font-size="16" font-weight="600" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      Biggest downside
    </text>
    <text x="1266" y="1148" fill="#A7B5C8" font-size="15" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
      The user first consumes, then switches modes, then finally decides.
    </text>
  </g>

  <rect x="50" y="1160" width="1700" height="40" rx="20" fill="#10192A" stroke="#FFFFFF12"/>
  <text x="900" y="1186" text-anchor="middle" fill="#FFD0AF" font-size="15" font-weight="600" font-family="'Sora', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
    Recommendation: borrow TikTok's continuous movement, not TikTok's decision placement.
  </text>
</svg>
